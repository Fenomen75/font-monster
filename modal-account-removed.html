<div id="accountRemovedOverlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--surface);border-radius:20px;padding:40px 36px;max-width:400px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.25);position:relative">
    <div style="width:60px;height:60px;border-radius:50%;background:rgba(239,68,68,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <h2 style="font-size:20px;font-weight:700;color:var(--text);margin:0 0 10px;letter-spacing:-0.03em" id="accountRemovedTitle">Account Removed</h2>
    <p style="font-size:14px;color:var(--text2);line-height:1.6;margin:0 0 28px" id="accountRemovedMsg">This account has been removed. If you think this is a mistake, please contact support.</p>
    <button onclick="closeAccountRemovedModal()" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">OK</button>
  </div>
</div>
