<div class="auth-overlay" id="contactOverlay" onclick="closeContactModal()">
  <div onclick="event.stopPropagation()" style="
    background:var(--surface-solid);border:1px solid var(--border2);
    border-radius:20px;width:92%;max-width:520px;position:relative;
    box-shadow:0 24px 80px rgba(0,0,0,0.25);overflow:hidden;
  ">
    <!-- Header gradient bar -->
    <div style="background:linear-gradient(135deg,var(--accent),var(--text3));height:4px;width:100%"></div>

    <div style="padding:28px 28px 0">
      <!-- Close -->
      <button onclick="closeContactModal()" style="
        position:absolute;top:16px;right:16px;
        background:var(--surface3);border:1px solid var(--border);
        border-radius:50%;width:30px;height:30px;cursor:pointer;
        display:flex;align-items:center;justify-content:center;color:var(--text3);
        transition:all .15s
      " onmouseover="this.style.background='var(--surface4)';this.style.color='var(--text)'"
         onmouseout="this.style.background='var(--surface3)';this.style.color='var(--text3)'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <!-- Title -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div style="
          width:40px;height:40px;border-radius:12px;flex-shrink:0;
          background:linear-gradient(135deg,var(--accent),var(--text2));
          display:flex;align-items:center;justify-content:center;
        ">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.03em">Get in touch</div>
          <div style="font-size:12px;color:var(--text3);margin-top:1px">We usually reply within 24 hours</div>
        </div>
      </div>

      <!-- Topic chips -->
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin:16px 0 20px">
        <button class="ct-chip active" onclick="selectChip(this,'bug')" data-val="bug">🐛 Bug report</button>
        <button class="ct-chip" onclick="selectChip(this,'font')" data-val="font">🔤 Font request</button>
        <button class="ct-chip" onclick="selectChip(this,'collab')" data-val="collab">🤝 Collab</button>
        <button class="ct-chip" onclick="selectChip(this,'feedback')" data-val="feedback">💬 Feedback</button>
        <button class="ct-chip" onclick="selectChip(this,'other')" data-val="other">✉️ Other</button>
      </div>
    </div>

    <div id="contactFormWrap" style="padding:0 28px 28px">
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" id="ctName" class="form-input" placeholder="Your name">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="ctEmail" class="form-input" placeholder="you@example.com">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea id="ctMessage" class="form-input" rows="5"
            placeholder="Describe your message in detail."
            style="resize:vertical;min-height:110px;line-height:1.6"></textarea>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:2px">
          <div style="font-size:11px;color:var(--text3);line-height:1.5">
            ✉️ You can also reach us at<br>
            <span style="color:var(--accent)">hello@fontmonster.app</span>
          </div>
          <button onclick="submitContact()" id="ctSendBtn" style="
            background:var(--accent);color:var(--bg);
            border:none;border-radius:12px;padding:10px 22px;
            font-size:13px;font-weight:700;letter-spacing:-0.01em;
            cursor:pointer;display:flex;align-items:center;gap:7px;
            transition:all .15s;white-space:nowrap;flex-shrink:0
          " onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send
          </button>
        </div>
      </div>
    </div>

    <div id="contactSuccess" style="display:none;text-align:center;padding:40px 28px 36px">
      <div style="font-size:52px;margin-bottom:14px;animation:badgePop .5s cubic-bezier(.34,1.56,.64,1) both">✉️</div>
      <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-0.03em">Message sent!</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.6">Thanks for reaching out.<br>We'll get back to you within 24 hours.</div>
      <button onclick="closeContactModal()" style="
        background:var(--surface3);border:1px solid var(--border2);
        border-radius:12px;padding:10px 24px;font-size:13px;font-weight:600;
        color:var(--text);cursor:pointer;transition:all .15s
      " onmouseover="this.style.background='var(--surface4)'" onmouseout="this.style.background='var(--surface3)'">Close</button>
    </div>
  </div>
</div>
