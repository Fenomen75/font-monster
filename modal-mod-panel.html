<div id="modPanelOverlay" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0);backdrop-filter:blur(0px);transition:background .3s,backdrop-filter .3s" onclick="closeModPanel()">
  <div id="modPanelDrawer" onclick="event.stopPropagation()" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-40%) scale(0.96);width:min(720px,95vw);max-height:88vh;background:var(--surface-solid);display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,0.28);border-radius:18px;overflow:hidden;opacity:0;transition:transform .3s cubic-bezier(0.4,0,0.2,1),opacity .3s ease;">
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#1a3a6b 0%,#0d2241 100%);flex-shrink:0">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:36px;height:36px;background:rgba(255,255,255,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center">🛡️</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.03em">Moderator Panel</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.55);margin-top:1px">Review & approve font submissions</div>
        </div>
      </div>
      <button onclick="closeModPanel()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'">✕</button>
    </div>
    <!-- Content -->
    <div id="modPanelContent" style="flex:1;overflow-y:auto;padding:20px 22px;">
      <div style="text-align:center;color:var(--text3);padding:40px">Loading.</div>
    </div>
  </div>
</div>
