<div id="pairModal" style="display:flex;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;visibility:hidden;transition:opacity .2s,visibility .2s">
  <div style="background:var(--surface-solid);border:1px solid var(--border);border-radius:20px;width:100%;max-width:680px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.35);max-height:90vh;overflow-y:auto">
    <div style="padding:22px 24px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface-solid);border-bottom:1px solid var(--border);z-index:1">
      <div>
        <div style="font-size:16px;font-weight:700;letter-spacing:-0.03em;color:var(--text);display:flex;align-items:center;gap:8px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="2" rx="0.5"/><rect x="3" y="15" width="12" height="2" rx="0.5"/></svg>
          Heading + Body Pair
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:3px">Pick two fonts and see how they look together</div>
      </div>
      <button onclick="closePairModal()" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:8px;line-height:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div style="padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px">Heading Font</div>
        <select id="pairHeadingSelect" onchange="renderPairPreview()" style="width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;cursor:pointer"></select>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px">Body Font</div>
        <select id="pairBodySelect" onchange="renderPairPreview()" style="width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;cursor:pointer"></select>
      </div>
    </div>

    <div style="margin:0 24px 12px;display:flex;gap:8px;align-items:center">
      <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)">Preview text</span>
      <input type="text" id="pairCustomText" value="The quick brown fox" placeholder="type your own text." oninput="renderPairPreview()" style="flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none">
      <button onclick="togglePairTheme()" id="pairThemeToggleBtn" title="Toggle Light / Dark" style="width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--surface-solid);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,border-color .2s">
        <svg id="pairThemeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- sun icon (shown in light mode) -->
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>

    <!-- Zoom slider -->
    <div style="margin:0 24px 14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);white-space:nowrap">Zoom</span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <input type="range" id="pairZoomSlider" min="60" max="200" value="100" oninput="applyPairZoom(this.value)" style="flex:1;accent-color:var(--accent);cursor:pointer;height:3px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <span id="pairZoomLabel" style="font-size:11px;font-weight:600;color:var(--text3);min-width:34px;text-align:right">100%</span>
    </div>

    <div id="pairPreviewWrap" style="margin:0 24px 24px;border-radius:16px;overflow:hidden;border:1px solid var(--border)">
      <div id="pairPreviewCanvas" style="padding:40px 36px;background:#fff;transition:background .2s">
        <div id="pairHeadingPreview" style="font-size:48px;line-height:1.1;margin-bottom:16px;transition:font-family .3s,font-size .2s">Heading Text</div>
        <div id="pairBodyPreview" style="font-size:16px;line-height:1.7;color:#555;transition:font-family .3s,font-size .2s">The quick brown fox jumps over the lazy dog. Typography is the art and technique of arranging type to make written language legible, readable and appealing when displayed.</div>
      </div>
    </div>
  </div>
</div>



<!-- ?? SCROLL TO TOP ?? -->
<button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top" style="
  position:fixed;bottom:28px;right:28px;z-index:9999;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
  opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;
  transform:translateY(10px);
">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>
